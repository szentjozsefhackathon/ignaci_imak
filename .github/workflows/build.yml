name: Build & Release App

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

# Required for pushing to GitHub Container Registry (GHCR)
permissions:
  contents: write
  packages: write

jobs:
  # --- JOB 1: Web & Docker (Runs on Linux - Fast & Cheap) ---
  build-web-docker:
    name: Build Web & Push Docker
    runs-on: ubuntu-latest
    environment: teszt
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Create .env file
        uses: jakubcieslik99/secrets-vars-to-env-file-action@main
        with:
          # This maps all your GitHub Secrets and Vars into the .env file
          secrets: ${{ toJSON(secrets) }}
          vars: ${{ toJSON(vars) }}
          # Exclude internal GitHub noise
          exclude: FLUTTER_ROOT, PUB_CACHE, GHRC_TOKEN
      - name: Install dependencies
        run: |
          flutter pub get
          dart run build_runner build --delete-conflicting-outputs
          dart run flutter_launcher_icons

      - name: Build Flutter Web
        run: |
          # Custom scripts for your sqlite/drift setup
          dart tools/download_sqlite3_wasm.dart
          dart compile js -O4 web/drift_worker.dart --output web/drift_worker.js
          flutter build web --release --base-href="/web-app/"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GHRC_TOKEN }}

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          # This should point to your Nginx Dockerfile in the flutter-web folder
          file: ./web/Dockerfile.prod
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/ignacio-flutter-web:latest
            ghcr.io/${{ github.repository_owner }}/ignacio-flutter-web:${{ github.sha }}
          # This LINKs the package to your repo sidebar automatically
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}

  # --- JOB 2: Android (Runs on Linux) ---
  build-android:
    name: Build Android Bundle
    runs-on: ubuntu-latest
    environment: teszt
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'oracle'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
      - name: Create .env file
        uses: jakubcieslik99/secrets-vars-to-env-file-action@main
        with:
          # This maps all your GitHub Secrets and Vars into the .env file
          secrets: ${{ toJSON(secrets) }}
          vars: ${{ toJSON(vars) }}
          # Exclude internal GitHub noise
          exclude: FLUTTER_ROOT, PUB_CACHE, GHRC_TOKEN

      - name: Install dependencies
        run: |
          flutter pub get
          dart run build_runner build --delete-conflicting-outputs
          dart run flutter_launcher_icons

      - name: Decode keystore & Create properties
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > android/app/keystore.jks
          echo "storePassword=${{ secrets.KEYSTORE_PASSWORD }}" > android/key.properties
          echo "keyPassword=${{ secrets.KEY_PASSWORD }}" >> android/key.properties
          echo "keyAlias=${{ secrets.KEY_ALIAS }}" >> android/key.properties
          echo "storeFile=keystore.jks" >> android/key.properties

      - name: Build App Bundle
        run: flutter build appbundle --release

      - name: Upload Android Artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-release
          path: build/app/outputs/bundle/release/app-release.aab

  # --- JOB 3: iOS (The only one that needs macOS) ---
  build-ios:
    name: Build iOS IPA
    runs-on: macos-latest
    environment: teszt
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
      - name: Create .env file
        uses: jakubcieslik99/secrets-vars-to-env-file-action@main
        with:
          # This maps all your GitHub Secrets and Vars into the .env file
          secrets: ${{ toJSON(secrets) }}
          vars: ${{ toJSON(vars) }}
          # Exclude internal GitHub noise
          exclude: FLUTTER_ROOT, PUB_CACHE, GHRC_TOKEN
      - name: Install dependencies
        run: |
          flutter pub get
          dart run build_runner build --delete-conflicting-outputs
          dart run flutter_launcher_icons

      - name: Build IPA (No Codesign)
        run: flutter build ipa --no-codesign

      - name: Compress and Upload iOS Artifact
        run: |
          cd build
          tar -czf ios_build.tar.gz ios
      - uses: actions/upload-artifact@v7
        with:
          name: ios-release
          path: build/ios_build.tar.gz

  # --- JOB 4: Create GitHub Release (Runs after others finish) ---
  create-release:
    name: Finalize GitHub Release
    needs: [build-android, build-ios]
    runs-on: ubuntu-latest
    environment: teszt
    steps:
      - name: Download Artifacts
        uses: actions/download-artifact@v4

      - name: Create Release
        uses: ncipollo/release-action@v1
        with:
          artifacts: "android-release/*.aab,ios-release/*.tar.gz"
          tag: "v0.0.${{ github.run_number }}"
          token: ${{ secrets.GHRC_TOKEN }}
